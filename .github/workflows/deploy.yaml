name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: website-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  verify_and_build:
    name: Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
      NEXT_PUBLIC_SOCKET_PATH: ${{ secrets.NEXT_PUBLIC_SOCKET_PATH }}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
      MAPBOX_API_KEY: ${{ secrets.MAPBOX_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required build secrets
        run: |
          required=(
            NEXT_PUBLIC_FIREBASE_API_KEY
            NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
            NEXT_PUBLIC_FIREBASE_PROJECT_ID
            NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
            NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
            NEXT_PUBLIC_FIREBASE_APP_ID
          )

          for name in "${required[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: $name"
              exit 1
            fi
          done

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-production-build
          path: |
            .next
            public
            package.json
            pnpm-lock.yaml
            next.config.ts
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy (Custom Target)
    runs-on: ubuntu-latest
    needs: verify_and_build
    timeout-minutes: 20
    environment:
      name: production
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_SOCKET_URL: ${{ secrets.NEXT_PUBLIC_SOCKET_URL }}
      NEXT_PUBLIC_SOCKET_PATH: ${{ secrets.NEXT_PUBLIC_SOCKET_PATH }}
      NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
      MAPBOX_API_KEY: ${{ secrets.MAPBOX_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-production-build
          path: deploy-bundle

      - name: Custom production deploy hook
        env:
          DEPLOY_BUNDLE_DIR: ${{ github.workspace }}/deploy-bundle
          DEPLOY_ENVIRONMENT: production
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploy bundle directory: $DEPLOY_BUNDLE_DIR"
          echo "Commit: $DEPLOY_SHA"
          echo "Branch: $DEPLOY_REF_NAME"
          echo "Environment: $DEPLOY_ENVIRONMENT"

          # Add your hosting deploy logic in scripts/deploy-production.sh.
          # Example targets: SSH, Docker host, EC2.
          if [ -f "./scripts/deploy-production.sh" ]; then
            bash ./scripts/deploy-production.sh "$DEPLOY_BUNDLE_DIR"
          else
            echo "::warning::No scripts/deploy-production.sh found."
            echo "::notice::Build verification and artifact packaging succeeded."
            echo "::notice::Add scripts/deploy-production.sh to enable SSH/Docker/EC2 deployment."
          fi

      - name: Deployment summary
        run: |
          {
            echo "### Production Deploy Workflow"
            echo ""
            echo "- Trigger: push to \`main\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Artifact: \`website-production-build\`"
            echo "- Deploy hook: \`scripts/deploy-production.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"
