name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: website-production-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10"

jobs:
  verify_and_build:
    name: Verify Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-production-build
          path: |
            .next
            public
            package.json
            pnpm-lock.yaml
            next.config.ts
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy (Custom Target)
    runs-on: ubuntu-latest
    needs: verify_and_build
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-production-build
          path: deploy-bundle

      - name: Custom production deploy hook
        env:
          DEPLOY_BUNDLE_DIR: ${{ github.workspace }}/deploy-bundle
          DEPLOY_ENVIRONMENT: production
          DEPLOY_SHA: ${{ github.sha }}
          DEPLOY_REF_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploy bundle directory: $DEPLOY_BUNDLE_DIR"
          echo "Commit: $DEPLOY_SHA"
          echo "Branch: $DEPLOY_REF_NAME"
          echo "Environment: $DEPLOY_ENVIRONMENT"

          # Add your hosting deploy logic in scripts/deploy-production.sh.
          # Example targets: SSH, Docker host, EC2.
          if [ -f "./scripts/deploy-production.sh" ]; then
            bash ./scripts/deploy-production.sh "$DEPLOY_BUNDLE_DIR"
          else
            echo "::warning::No scripts/deploy-production.sh found."
            echo "::notice::Build verification and artifact packaging succeeded."
            echo "::notice::Add scripts/deploy-production.sh to enable SSH/Docker/EC2 deployment."
          fi

      - name: Deployment summary
        run: |
          {
            echo "### Production Deploy Workflow"
            echo ""
            echo "- Trigger: push to \`main\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Artifact: \`website-production-build\`"
            echo "- Deploy hook: \`scripts/deploy-production.sh\`"
          } >> "$GITHUB_STEP_SUMMARY"
